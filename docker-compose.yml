version: '3.8'

services:
  # 1. Base de Datos (PostgreSQL)
  orchestrator-db:
    image: postgres:16
    container_name: orchestrator_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=crud_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - orchestrator-network

  # 2. Coordinador de Kafka (Zookeeper)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: orchestrator_zookeeper
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    networks:
      - orchestrator-network

  # 3. El Broker de Mensajería (Kafka)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: orchestrator_kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    depends_on:
      - zookeeper
    networks:
      - orchestrator-network

  # 4. Tu Aplicación Spring Boot
  orchestrator-app:
    build: .
    container_name: orchestrator_app
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://orchestrator-db:5432/crud_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - orchestrator-db
      - kafka
    networks:
      - orchestrator-network

volumes:
  pgdata:

networks:
  orchestrator-network:
    driver: bridge