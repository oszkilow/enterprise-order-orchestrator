version: '3.8'
services:
  orchestrator-db:
    image: postgres:16
    container_name: orchestrator_postgres
    environment:
      - POSTGRES_DB=orchestrator_db
      - POSTGRES_USER=admin_user
      - POSTGRES_PASSWORD=enterprise_secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_orch:/var/lib/postgresql/data

volumes:
  postgres_data_orch:

